name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: spotify_ai
          POSTGRES_USER: spotify_user
          POSTGRES_PASSWORD: spotify_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U spotify_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://spotify_user:spotify_password@localhost:5432/spotify_ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5 # Updated to latest version
        with:
          version: "latest"
          enable-cache: true # Speeds up subsequent runs

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        # 'uv sync' installs the project and all default + dev dependencies
        run: uv sync --all-groups

      - name: Run Linting and Tests
        # Using 'uv run' will automatically use the synced environment
        run: |
          uv run ruff check .
          uv run black --check .
          uv run mypy app
          uv run pytest
